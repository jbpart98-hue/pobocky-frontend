name: Deploy na GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      # Tento krok vytvoří KOMPLETNÍ config.js i se středem a zoomem mapy
      - name: Vytvořit bezpečný config.js
        run: |
          cat << 'EOF' > config.js
          const CONFIG = {
              API_BASE: 'https://moje-pobocky-backend.onrender.com',
              NOMINATIM_URL: 'https://nominatim.openstreetmap.org',
              API_KEY: '${{ secrets.API_KEY }}',
              MAP_DEFAULT_CENTER: [49.8175, 15.4730], // Střed ČR
              MAP_DEFAULT_ZOOM: 7,                    // Přiblížení na celou ČR
              MAP_ZOOM_ON_SELECT: 15                  // Detail při kliknutí na pobočku
          };
          EOF
      
      - uses: actions/configure-pages@v5
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - uses: actions/deploy-pages@v4
