name: Deploy na GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Tímto přinutíme GitHub běžet na novém Node.js 24 a schováme varování
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Vložit API klíč do konfigurace
        run: |
          sed -i "s/%%API_KEY%%/${{ secrets.API_KEY }}/g" js/config.js
      
      - uses: actions/configure-pages@v5
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      - uses: actions/deploy-pages@v4
