name: Deploy na GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Vložit API klíč do konfigurace
        run: |
          sed -i "s/%%API_KEY%%/${{ secrets.API_KEY }}/g" js/config.js
      
      - uses: actions/configure-pages@v5
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Tečka znamená, že index.html je na hlavní stránce GitHubu
          
      - uses: actions/deploy-pages@v4
