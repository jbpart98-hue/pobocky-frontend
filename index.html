<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Poboček</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="search-block">
                <input id="searchInput" type="text" placeholder="Hledat pobočku (město, PSČ)...">
            </div>
            <button class="geo-btn" onclick="getUserLocation()">Použít moji polohu</button>
            <div id="statsBar" class="stats-bar"></div>
            <div id="resultsList" class="results-list"></div>
        </aside>
        <main id="map"></main>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="data.js"></script> <!-- DŮLEŽITÉ: Načíst data jako první -->
    <script src="map.js"></script>
    <script src="search.js"></script>
    <script src="app.js"></script>
</body>
</html>
