<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Poboček Partners</title>
    <!-- Externí knihovna pro mapy -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Váš hlavní soubor se styly -->
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            
            <!-- Vyhledávací blok nyní obsahuje i prvek pro našeptávač -->
            <div class="search-block">
                <input id="searchInput" type="text" placeholder="Hledat adresu nebo pobočku...">
                <!-- TOTO JE TEN CHYBĚJÍCÍ PRVEK -->
                <div id="autocomplete" class="autocomplete-list"></div>
            </div>

            <button class="geo-btn" onclick="getUserLocation()">Použít moji polohu</button>
            <div id="statsBar" class="stats-bar"></div>
            <div id="resultsList" class="results-list"></div>
        </aside>
        <main id="map"></main>
    </div>

    <!-- Načtení skriptů na konci body -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="map.js"></script>
    <script src="search.js"></script>
    <script src="app.js"></script>
</body>
</html>
