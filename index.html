<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog poboček</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="app.css" />
</head>
<body>

    <header class="site-header">
        <h1>Seznam poboček</h1>
        <nav class="nav-tabs">
            <button onclick="showView('list')">Seznam</button>
            <button onclick="showView('map')">Mapa</button>
        </nav>
    </header>

    <main class="app-layout">
        <div id="listView" class="view">
            <div class="search-block">
                <input type="text" id="searchInput" placeholder="Hledat pobočku...">
            </div>
            <div class="results-list" id="listGrid"></div>
        </div>

        <div id="mapView" class="view" style="display:none;">
            <div id="map" style="height: 500px; width: 100%;"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
