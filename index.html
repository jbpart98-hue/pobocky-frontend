<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Poboček Partners</title>
    <!-- Externí knihovna pro mapy -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Váš hlavní soubor se styly - opravená cesta pro GitHub Pages -->
    <link rel="stylesheet" href="/pobocky-frontend/app.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="search-block">
                <input id="searchInput" type="text" placeholder="Hledat pobočku (město, PSČ)...">
            </div>
            <button class="geo-btn" onclick="getUserLocation()">Použít moji polohu</button>
            <div id="statsBar" class="stats-bar"></div>
            <div id="resultsList" class="results-list"></div>
        </aside>
        <main id="map"></main>
    </div>

    <!-- Načtení skriptů na konci body - opravené cesty pro GitHub Pages -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/pobocky-frontend/data.js"></script>
    <script src="/pobocky-frontend/map.js"></script>
    <script src="/pobocky-frontend/search.js"></script>
    <script src="/pobocky-frontend/app.js"></script>
</body>
</html>
