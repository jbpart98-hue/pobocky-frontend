<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog poboček</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>Seznam poboček</h1>
    </div>
  </header>

  <main class="app-layout">
    <div class="search-block">
      <input type="text" id="searchInput" placeholder="Hledat pobočku, město nebo PSČ..." autocomplete="off">
      <button id="clearSearch" style="display:none">✕</button>
    </div>

    <div class="stats-bar">
      <span id="statsText">Načítám...</span>
    </div>

    <div class="results-list" id="listGrid"></div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
